services:
  - type: cron
    name: coduyig
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: npx tsx src/cron.ts
    schedule: "0 7,11,17 * * *"
    region: frankfurt
    plan: starter
    envVars:
      - key: IG_PAGE_TOKEN_EN
        sync: false
      - key: IG_PAGE_TOKEN_SK
        sync: false
      - key: IG_USER_ID_EN
        sync: false
      - key: IG_USER_ID_SK
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
