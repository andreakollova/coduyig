name: Daily Content

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Force slot: morning / lunch / evening'
        required: false
      dry_run:
        description: 'Dry run'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install npm dependencies
        run: npm install

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Determine what to publish
        id: plan
        run: |
          DAY=$(date -u +%j)
          # Rotate: 0=rozhovor, 1=bytefall, 2=bytesurf
          REEL_TYPE=$(( DAY % 3 ))
          echo "reel_type=$REEL_TYPE" >> $GITHUB_OUTPUT
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "📅 Day $DAY | Reel type: $REEL_TYPE (0=rozhovor, 1=bytefall, 2=bytesurf)"

      - name: Dialog Reel
        if: steps.plan.outputs.reel_type == '0'
        env:
          IG_PAGE_TOKEN_EN: ${{ secrets.IG_PAGE_TOKEN_EN }}
          IG_PAGE_TOKEN_SK: ${{ secrets.IG_PAGE_TOKEN_SK }}
          IG_USER_ID_EN: ${{ secrets.IG_USER_ID_EN }}
          IG_USER_ID_SK: ${{ secrets.IG_USER_ID_SK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          npx tsx src/indexReel.ts $ARGS | tee /tmp/reel.txt
          LESSON_ID=$(grep -oP 'lesson_id=\K\d+' /tmp/reel.txt || echo "")
          if [ -n "$LESSON_ID" ]; then
            npx tsx src/indexReel.ts --lang sk --lesson-id $LESSON_ID $ARGS
          else
            npx tsx src/indexReel.ts --lang sk $ARGS
          fi

      - name: ByteFall
        if: steps.plan.outputs.reel_type == '1'
        env:
          IG_PAGE_TOKEN_EN: ${{ secrets.IG_PAGE_TOKEN_EN }}
          IG_PAGE_TOKEN_SK: ${{ secrets.IG_PAGE_TOKEN_SK }}
          IG_USER_ID_EN: ${{ secrets.IG_USER_ID_EN }}
          IG_USER_ID_SK: ${{ secrets.IG_USER_ID_SK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: npx tsx src/indexByteFall.ts

      - name: ByteSurf
        if: steps.plan.outputs.reel_type == '2'
        env:
          IG_PAGE_TOKEN_EN: ${{ secrets.IG_PAGE_TOKEN_EN }}
          IG_PAGE_TOKEN_SK: ${{ secrets.IG_PAGE_TOKEN_SK }}
          IG_USER_ID_EN: ${{ secrets.IG_USER_ID_EN }}
          IG_USER_ID_SK: ${{ secrets.IG_USER_ID_SK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: npx tsx src/indexByteSurf.ts
