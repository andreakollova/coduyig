name: Daily Quiz Post

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 13:00 CEST (different time from lesson post)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (render only, no publish)'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser ffmpeg

      - name: Install npm dependencies
        run: npm install

      - name: Run quiz publisher
        env:
          IG_PAGE_TOKEN_EN: ${{ secrets.IG_PAGE_TOKEN_EN }}
          IG_PAGE_TOKEN_SK: ${{ secrets.IG_PAGE_TOKEN_SK }}
          IG_USER_ID_EN: ${{ secrets.IG_USER_ID_EN }}
          IG_USER_ID_SK: ${{ secrets.IG_USER_ID_SK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          npx tsx src/indexQuiz.ts $ARGS
